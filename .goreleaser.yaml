builds:
  - id: default
    main: main.go
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
    env:
      - CGO_ENABLED=0

  - id: goboring
    main: main.go
    goos:
      - linux
    goarch:
      - amd64
    env:
      - CGO_ENABLED=1
      - GOFIPS140=latest
      - GODEBUG=fips140=on

archives:
  - id: default
    format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- if eq .Os "darwin" }}macOS{{ else }}{{ .Os | title }}{{ end }}_
      {{- if eq .Arch "amd64" }}64-bit{{ else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE
      - README.md
    builds:
      - default

  - id: goboring
    format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Os | title }}_
      {{- if eq .Arch "amd64" }}64-bit_goboring{{ else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE
      - README.md
    builds:
      - goboring

release:
  draft: true
  prerelease: true
